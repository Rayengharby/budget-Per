<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Connexion — BudgetCollab</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <span class="logo">💰</span>
      <h1>BudgetCollab</h1>
      <p>Connexion à votre compte</p>
    </div>
    <div class="auth-card">
      <div id="err-box" class="alert alert-error hidden"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" id="email" placeholder="votre@email.tn" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary w-full mt-4" id="btn-login" style="justify-content:center">Se connecter</button>
      <p style="text-align:center;margin-top:1.125rem;font-size:.8125rem;color:var(--muted)">
        Pas encore de compte ? <a href="register.html" style="color:var(--accent);font-weight:600">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script>
Auth.guestGuard();
const errBox=document.getElementById('err-box'),btn=document.getElementById('btn-login');
async function doLogin(){
  errBox.classList.add('hidden');btn.disabled=true;btn.textContent='Connexion…';
  const d=await api.post('auth/login',{email:document.getElementById('email').value,password:document.getElementById('password').value});
  if(d.success){Auth.save(d.token,d.user);location.href='dashboard.html';}
  else{errBox.textContent=d.message||'Erreur de connexion.';errBox.classList.remove('hidden');btn.disabled=false;btn.textContent='Se connecter';}
}
btn.addEventListener('click',doLogin);
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
